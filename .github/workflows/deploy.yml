name: Deploy PingGlobe Frontend to Amazon S3

on:
  push:
    branches:
      - main # Triggers the pipeline only when code lands on your primary branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down the code from your repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Spin up Node.js to manage the environment
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        # Removing 'cache: npm' here temporarily prevents corrupt cache override issues

    # 3. Force alignment of package dependencies 🟢 CHANGED HERE
    - name: Install Dependencies
      run: npm install --legacy-peer-deps

    # 4. Compile the production-minified assets
    - name: Build Production Bundle
      run: npm run build

    # 5. Connect securely to your AWS account environment
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    # 6. Push the compiled files to S3 and sync adjustments
    - name: Deploy to S3
      run: aws s3 sync dist/ s3://pingglobe-frontend-production --delete
